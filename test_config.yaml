port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
external-ui: ""
proxies:
  - name: "Test-Node-JP"
    type: ss
    server: 1.2.3.4
    port: 8388
    cipher: aes-256-gcm
    password: "testpassword"
  - name: "Test-Node-US"
    type: vmess
    server: 5.6.7.8
    port: 443
    uuid: "b831381d-6324-4d53-ad4f-8cda48b30811"
    alterId: 0
    cipher: auto
    network: ws
    ws-opts:
      path: "/ray"
proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "Test-Node-JP"
      - "Test-Node-US"
  - name: "Auto"
    type: url-test
    proxies:
      - "Test-Node-JP"
      - "Test-Node-US"
    url: "https://www.google.com"
    interval: 300
rules:
  - "DOMAIN-SUFFIX,google.com,PROXY"
  - "MATCH,Auto"
